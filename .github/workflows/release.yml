name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          python3 - "${{ steps.version.outputs.version }}" <<'EOF'
          import sys, re

          version = sys.argv[1]
          with open("CHANGELOG.md") as f:
              content = f.read()

          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f"No changelog entry found for {version}", file=sys.stderr)
              sys.exit(1)

          notes = match.group(1).strip()
          with open("release_notes.md", "w") as f:
              f.write(notes)
          print("Extracted release notes.")
          EOF

      - name: Validate manifest version matches tag
        run: |
          python3 -c "
          import json, sys
          m = json.load(open('manifest.json'))
          tag = '${{ steps.version.outputs.version }}'
          if m['version'] != tag:
              print(f'manifest.json version {m[\"version\"]} != tag {tag}')
              sys.exit(1)
          print(f'Version {tag} matches manifest.')
          "

      - name: Create release archive
        run: |
          tar -czf living-docs-${{ steps.version.outputs.version }}.tar.gz \
            --exclude='.git' \
            --exclude='*.tar.gz' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: living-docs-${{ steps.version.outputs.version }}.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
